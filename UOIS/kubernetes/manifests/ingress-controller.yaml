apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: main-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-redirect-from: "http://${UOIS_HOSTNAME}/"
    nginx.ingress.kubernetes.io/proxy-redirect-to: "https://${UOIS_HOSTNAME}/"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - "*.${UOIS_HOSTNAME}"
        - "${UOIS_HOSTNAME}"
      secretName: unob-tls
  rules:
    - host: ${UOIS_HOSTNAME}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 33001

          - path: /api/gql
            pathType: Prefix
            backend:
              service:
                name: apollo
                port:
                  number: 3000

    - host: pgadmin.${UOIS_HOSTNAME}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pgadmin
                port:
                  number: 31122
